name: Run Comix Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install Chrome
      uses: browser-actions/setup-chrome@v1

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install selenium pillow requests webdriver-manager

    - name: Run scraper
      run: |
        python scrape_mangas.py

    - name: Upload PDFs
      uses: actions/upload-artifact@v4
      with:
        name: comix-pdfs
        path: comix_output/pdfs